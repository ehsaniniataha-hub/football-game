<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>Mini Football</title>
<style>
body{
margin:0;
background:#222;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
font-family:Arial;
}
canvas{
background:#1d8f2f;
border:6px solid white;
}
#score{
position:absolute;
top:20px;
color:white;
font-size:30px;
font-weight:bold;
}
</style>
</head>
<body>

<div id="score">0 : 0</div>
<canvas id="game" width="900" height="500"></canvas>

<script>

const c=document.getElementById("game");
const ctx=c.getContext("2d");

let scoreA=0;
let scoreB=0;

const ball={
x:450,
y:250,
r:10,
vx:0,
vy:0
};

const p1={
x:120,
y:250,
r:18,
color:"blue"
};

const p2={
x:780,
y:250,
r:18,
color:"red"
};

const keys={};

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function beep(){
const ac=new AudioContext();
const o=ac.createOscillator();
const g=ac.createGain();
o.connect(g);
g.connect(ac.destination);
o.frequency.value=500;
o.start();
g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+0.25);
o.stop(ac.currentTime+0.25);
}

function reset(){
ball.x=450;
ball.y=250;
ball.vx=0;
ball.vy=0;
}

function update(){

if(keys["w"])p1.y-=4;
if(keys["s"])p1.y+=4;
if(keys["a"])p1.x-=4;
if(keys["d"])p1.x+=4;

if(keys["ArrowUp"])p2.y-=4;
if(keys["ArrowDown"])p2.y+=4;
if(keys["ArrowLeft"])p2.x-=4;
if(keys["ArrowRight"])p2.x+=4;

kick(p1);
kick(p2);

ball.x+=ball.vx;
ball.y+=ball.vy;

ball.vx*=0.99;
ball.vy*=0.99;

if(ball.y<10||ball.y>490)ball.vy*=-1;

if(ball.x<0){
scoreB++;
beep();
reset();
}

if(ball.x>900){
scoreA++;
beep();
reset();
}

document.getElementById("score").innerHTML=
scoreA+" : "+scoreB;

}

function kick(p){

let dx=ball.x-p.x;
let dy=ball.y-p.y;
let d=Math.sqrt(dx*dx+dy*dy);

if(d<p.r+ball.r){

ball.vx=dx*0.35;
ball.vy=dy*0.35;

}

}

function draw(){

ctx.clearRect(0,0,900,500);

ctx.fillStyle="#1d8f2f";
ctx.fillRect(0,0,900,500);

ctx.strokeStyle="white";
ctx.lineWidth=4;

ctx.strokeRect(0,0,900,500);

ctx.beginPath();
ctx.moveTo(450,0);
ctx.lineTo(450,500);
ctx.stroke();

ctx.beginPath();
ctx.arc(450,250,70,0,Math.PI*2);
ctx.stroke();

ctx.fillStyle="white";
ctx.fillRect(0,180,10,140);
ctx.fillRect(890,180,10,140);

ctx.fillStyle=p1.color;
ctx.beginPath();
ctx.arc(p1.x,p1.y,p1.r,0,Math.PI*2);
ctx.fill();

ctx.fillStyle=p2.color;
ctx.beginPath();
ctx.arc(p2.x,p2.y,p2.r,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="orange";
ctx.beginPath();
ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
ctx.fill();

}

function loop(){

update();
draw();
requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
